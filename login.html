<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Plaza Minuman</title>
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #151d30;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-secondary);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-header h1 span {
      color: var(--accent);
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background-color: var(--bg-primary);
      color: var(--text-main);
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 15px;
      display: none;
      text-align: center;
    }

    button[type="submit"] {
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      padding: 16px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      width: 100%;
      transition: all 0.2s;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <h1>Plaza <span>Minuman</span></h1>
      <p>Masuk ke Dashboard Finansial</p>
    </div>

    <div class="error-msg" id="error-box">Username atau password salah!</div>

    <form id="form-login">
      <div class="form-group">
        <label for="username">Nama Admin</label>
        <input type="text" id="username" placeholder="Masukkan nama admin..." required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit">Masuk Ke Sistem</button>
    </form>
  </div>

  <script>
    const adminList = {
      "admin1": "plaza123",
      "admin2": "minuman123"
    };

    if (localStorage.getItem('current_admin')) {
      window.location.href = 'index.html';
    }

    document.getElementById('form-login').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');

      if (adminList[user] && adminList[user] === pass) {
        errorBox.style.display = 'none';
        localStorage.setItem('current_admin', user);
        window.location.href = 'index.html';
      } else {
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
