<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaza Minuman - Login Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #151d30;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.05);
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background-color: var(--bg-primary);
      color: var(--text-main);
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
    }

    button[type="submit"] {
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      padding: 16px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      width: 100%;
      transition: all 0.2s;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">Plaza <span>Minuman</span></div>
    <div class="subtitle">Sistem Manajemen Finansial Terintegrasi</div>

    <div class="error-msg" id="error-box">Username atau password salah!</div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username Admin</label>
        <input type="text" id="username" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" id="btn-login">Masuk ke Sistem</button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://vccwscybnhpatjioixfx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_blMwzDZ5pM1TciQzhsg8UQ_cCB_ixOQ";
    
    const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const userIn = document.getElementById('username').value.trim();
      const passIn = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');
      const btnLogin = document.getElementById('btn-login');

      btnLogin.innerText = "Memverifikasi...";
      btnLogin.disabled = true;
      errorBox.style.display = "none";

      try {
        const { data, error } = await clientSupabase
          .from('admin_list')
          .select('*')
          .eq('username', userIn)
          .eq('password', passIn)
          .single();

        if (error || !data) {
          errorBox.style.display = "block";
          btnLogin.innerText = "Masuk ke Sistem";
          btnLogin.disabled = false;
        } else {
          localStorage.setItem('current_admin', data.username);
          localStorage.setItem('admin_role', data.role);
          window.location.href = 'index.html';
        }
      } catch (err) {
        console.error(err);
        errorBox.innerText = "Terjadi masalah koneksi server!";
        errorBox.style.display = "block";
        btnLogin.innerText = "Masuk ke Sistem";
        btnLogin.disabled = false;
      }
    });
  </script>
</body>
</html>
