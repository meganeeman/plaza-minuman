<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaza Minuman - Dashboard Cabang</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-primary: #060913;
      --bg-secondary: rgba(21, 29, 48, 0.4);
      --bg-card: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background-color: var(--bg-primary);
      color: var(--text-main);
      background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.02), transparent 400px);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 75px;
      background-color: rgba(6, 9, 19, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 12px;
      list-style: none;
    }

    .nav-menu a {
      display: flex;
      align-items: center;
      color: rgba(248, 250, 252, 0.6);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 16px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .nav-menu a:hover {
      color: var(--text-main);
      background-color: rgba(255, 255, 255, 0.03);
    }

    .nav-menu a.logout-btn {
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .nav-menu a.logout-btn:hover {
      background-color: rgba(239, 68, 68, 0.1);
    }

    .container {
      padding: 115px 40px 60px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-block {
      margin-bottom: 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header-text {
      flex: 1;
      min-width: 280px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 14px;
    }

    h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
    }

    .card {
      background: rgba(21, 29, 48, 0.35) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      padding: 24px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 13px;
      color: #94a3b8;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background-color: var(--bg-primary);
      color: var(--text-main);
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 10px;
    }

    button[type="submit"] {
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      padding: 16px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      width: 100%;
      transition: all 0.2s;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }

    .table-header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }

    .search-input {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background-color: var(--bg-primary);
      color: var(--text-main);
      width: 220px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background-color: var(--bg-primary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      background-color: rgba(255, 255, 255, 0.01);
      color: #94a3b8;
      font-weight: 500;
      font-size: 13px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .admin-badge {
      font-size: 11px;
      background: rgba(56, 189, 248, 0.08);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    @media (max-width: 900px) {
      .navbar { padding: 0 20px; }
      .container { padding: 105px 20px 40px 20px; }
      .table-header-flex { flex-direction: column; align-items: flex-start; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <script>
    const activeAdmin = localStorage.getItem('current_admin');
    const activeRole = localStorage.getItem('admin_role'); 
    const activeName = localStorage.getItem('admin_name');

    if (!activeAdmin || activeRole !== 'admin_cabang') {
      window.location.href = 'login.html';
    }
  </script>

  <nav class="navbar">
    <div class="logo">Plaza <span>Minuman</span></div>
    <ul class="nav-menu">
      <li><span id="display-admin-name" style="font-size:14px; color:#94a3b8; font-weight:500;"></span></li>
      <li><a href="#" class="logout-btn" id="logout-trigger">Keluar (Logout)</a></li>
    </ul>
  </nav>

  <div class="container">

    <section id="page-cabang">
      <div class="header-block">
        <div class="header-text">
          <h1>Laporan Keuangan Cabang</h1>
          <div class="subtitle">Halo, <span id="welcome-cabang" style="color:var(--accent); font-weight:600;"></span>! Silakan isi data operasional harian eksklusif Bank BRI di bawah ini.</div>
          <div id="live-clock" style="font-size: 12px; color: #64748b; margin-top: 8px; display: flex; align-items: center; gap: 6px;">
            <span style="color: var(--accent);">●</span> Memuat waktu server...
          </div>
        </div>
      </div>

      <div class="card">
        <form id="form-cabang">
          <div class="form-group">
            <label for="tgl-cabang">Tanggal Transaksi</label>
            <input type="date" id="tgl-cabang" onclick="this.showPicker()" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cabang-omset">Laporan Omset Harian (Rp)</label>
              <input type="text" id="cabang-omset" class="rupiah-mask" value="Rp 0" required>
            </div>
            <div class="form-group">
              <label for="cabang-cash-aktual">Cash Aktual Harian (Rp)</label>
              <input type="text" id="cabang-cash-aktual" class="rupiah-mask" value="Rp 0" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cabang-jumlah-transfer">Jumlah Transfer Harian via BRI (Rp)</label>
              <input type="text" id="cabang-jumlah-transfer" class="rupiah-mask" value="Rp 0" required>
            </div>
            <div class="form-group">
              <label for="cabang-setoran-bank">Setoran Cash Aktual ke Bank BRI (Rp)</label>
              <input type="text" id="cabang-setoran-bank" class="rupiah-mask" value="Rp 0" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cabang-out-cash">Pengeluaran Harian - CASH (Rp)</label>
              <input type="text" id="cabang-out-cash" class="rupiah-mask" value="Rp 0" required>
            </div>
            <div class="form-group">
              <label for="cabang-out-transfer">Pengeluaran Harian - TRANSFER BRI (Rp)</label>
              <input type="text" id="cabang-out-transfer" class="rupiah-mask" value="Rp 0" required>
            </div>
          </div>
          <div class="form-group">
            <label for="cabang-nota">Tautan Dokumen / Nota Pengeluaran (Opsional)</label>
            <input type="url" id="cabang-nota" placeholder="https://drive.google.com/..." style="width:100%; height:48px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px; background-color: var(--bg-primary); color: var(--text-main); font-size:14px;">
          </div>
          <button type="submit">Kirim Laporan Harian Cabang</button>
        </form>
      </div>

      <div class="card">
        <div class="table-header-flex">
          <h2>Log Transaksi Masuk Cabang</h2>
          <input type="text" id="search-cabang" class="search-input" placeholder="Cari tanggal laporan...">
        </div>
        <div class="table-responsive">
          <table id="table-cabang">
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Omset</th>
                <th>Cash Aktual</th>
                <th>Trf BRI</th>
                <th>Out Cash</th>
                <th>Out Trf</th>
                <th>Setoran Bank</th>
                <th>Nota</th>
                <th>Admin</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

  </div>

  <script>
    const SUPABASE_URL = "https://vccwscybnhpatjioixfx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_blMwzDZ5pM1TciQzhsg8UQ_cCB_ixOQ";
    const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('welcome-cabang').innerText = activeName || activeAdmin;
    document.getElementById('display-admin-name').innerText = `Login: ${activeName || activeAdmin} (Cabang)`;

    document.getElementById('logout-trigger').addEventListener('click', function(e) {
      e.preventDefault();
      if(confirm('Apakah kamu yakin ingin keluar dari sistem?')) {
        localStorage.clear();
        window.location.href = 'login.html';
      }
    });

    let dataCabang = [];

    const formatRupiah = (angka) => {
      return 'Rp ' + parseInt(angka).toLocaleString('id-ID');
    };

    const cleanRupiahValue = (str) => {
      if (!str) return 0;
      const clean = str.replace(/[^0-9]/g, '');
      return parseFloat(clean) || 0;
    };

    const formatInputRupiah = (val) => {
      const number = val.replace(/[^0-9]/g, '');
      if (!number) return 'Rp 0';
      return 'Rp ' + parseInt(number).toLocaleString('id-ID');
    };

    document.querySelectorAll('.rupiah-mask').forEach(input => {
      input.addEventListener('focus', function() {
        if (this.value === 'Rp 0') this.value = '';
      });
      
      input.addEventListener('blur', function() {
        if (this.value === '') this.value = 'Rp 0';
      });

      input.addEventListener('input', function() {
        const cursorPosition = this.selectionStart;
        const oldLength = this.value.length;
        this.value = formatInputRupiah(this.value);
        const newLength = this.value.length;
        this.setSelectionRange(cursorPosition + (newLength - oldLength), cursorPosition + (newLength - oldLength));
      });
    });

    const getDayName = (dateString) => {
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const date = new Date(dateString);
      return days[date.getDay()];
    };

    const formatDateWithDay = (dateString) => {
      if (!dateString) return '';
      const dayName = getDayName(dateString);
      const parts = dateString.split('-');
      if (parts.length === 3) {
        return `${dayName}, ${parts[2]}/${parts[1]}/${parts[0]}`;
      }
      return dateString;
    };

    async function fetchCabangData() {
      try {
        const { data, error } = await clientSupabase.from('laporan_cabang').select('*').order('tanggal', { ascending: false });
        if (!error) {
          dataCabang = data || [];
          renderCabangTable();
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderCabangTable() {
      const filterCabang = document.getElementById('search-cabang').value.toLowerCase();
      const tbodyCabang = document.querySelector('#table-cabang tbody');
      tbodyCabang.innerHTML = '';

      dataCabang.forEach((item) => {
        const displayedDate = formatDateWithDay(item.tanggal);
        const creator = item.admin || 'Cabang';
        const notaLink = item.nota ? `<a href="${item.nota}" target="_blank" style="color:var(--accent); text-decoration:none;">Buka Nota</a>` : '-';

        if (displayedDate.toLowerCase().includes(filterCabang) || item.tanggal.toLowerCase().includes(filterCabang)) {
          tbodyCabang.innerHTML += `
            <tr>
              <td>${displayedDate}</td>
              <td>${formatRupiah(item.omset || 0)}</td>
              <td>${formatRupiah(item.cash_aktual || 0)}</td>
              <td>${formatRupiah(item.jumlah_transfer || 0)}</td>
              <td>${formatRupiah(item.pengeluaran_cash || 0)}</td>
              <td>${formatRupiah(item.pengeluaran_transfer || 0)}</td>
              <td>${formatRupiah(item.setoran_bank || 0)}</td>
              <td>${notaLink}</td>
              <td><span class="admin-badge">${creator}</span></td>
            </tr>
          `;
        }
      });
    }

    function startLiveClock() {
      const clockElement = document.getElementById('live-clock');
      setInterval(() => {
        const sekarang = new Date();
        const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const tanggalFormatted = sekarang.toLocaleDateString('id-ID', opsiTanggal);
        const jamFormatted = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        clockElement.innerHTML = `<span style="color: #10b981; animation: pulse 2s infinite;">●</span> ${tanggalFormatted} | ${jamFormatted} WIB`;
      }, 1000);
    }

    document.getElementById('search-cabang').addEventListener('input', renderCabangTable);

    document.getElementById('form-cabang').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerText = "Mengirim data...";

      const baru = {
        tanggal: document.getElementById('tgl-cabang').value,
        omset: cleanRupiahValue(document.getElementById('cabang-omset').value),
        cash_aktual: cleanRupiahValue(document.getElementById('cabang-cash-aktual').value),
        jumlah_transfer: cleanRupiahValue(document.getElementById('cabang-jumlah-transfer').value),
        setoran_bank: cleanRupiahValue(document.getElementById('cabang-setoran-bank').value),
        pengeluaran_cash: cleanRupiahValue(document.getElementById('cabang-out-cash').value),
        pengeluaran_transfer: cleanRupiahValue(document.getElementById('cabang-out-transfer').value),
        nota: document.getElementById('cabang-nota').value,
        admin: activeName || activeAdmin
      };

      const { error } = await clientSupabase.from('laporan_cabang').insert([baru]);
      btn.disabled = false;
      btn.innerText = "Kirim Laporan Harian Cabang";

      if (!error) {
        this.reset();
        document.querySelectorAll('.rupiah-mask').forEach(input => input.value = 'Rp 0');
        document.getElementById('cabang-nota').value = '';
        fetchCabangData();
      } else {
        alert('Gagal menyimpan laporan cabang ke server cloud!');
      }
    });

    fetchCabangData();
    startLiveClock();
    document.getElementById('tgl-cabang').value = new Date().toISOString().split('T')[0];
  </script>
</body>
</html>
